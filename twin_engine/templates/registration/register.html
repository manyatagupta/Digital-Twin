<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Register - Digital Twin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { background: #0a0b0f; color: #eef0f8; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .auth-card { background: #111318; border: 1px solid rgba(255,255,255,0.07); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; margin: 40px 0; }
  h2 { color: #35f1c8; margin-bottom: 5px; }
  p { color: #5a6280; font-size: 14px; margin-bottom: 25px; }
  .field { margin-bottom: 15px; text-align: left; }
  label { font-size: 12px; color: #8892b0; font-weight: 600; text-transform: uppercase; }
  input { width: 100%; padding: 12px; margin-top: 5px; background: #181c24; border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; color: white; font-family: 'Space Grotesk'; outline: none; box-sizing: border-box; }
  input:focus { border-color: #35f1c8; }
  .btn { width: 100%; background: #35f1c8; color: #0a0b0f; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Space Grotesk'; transition: 0.2s; }
  .helptext { font-size: 10px; color: #5a6280; margin-top: 4px; display: block; }
  ul { list-style: none; padding: 0; margin: 0 0 10px 0; color: #f17035; font-size: 12px; }
  .link { color: #c8f135; text-decoration: none; font-size: 13px; display: block; margin-top: 15px; }
</style>
</head>
<body>
  <div class="auth-card">
    <h2>Naya Twin Banao 🧬</h2>
    <p>Apni digital copy train karna shuru karo.</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="field">
          {{ field.label_tag }}
          {{ field }}
          {% if field.help_text %}
            <span class="helptext">{{ field.help_text }}</span>
          {% endif %}
          {{ field.errors }}
        </div>
      {% endfor %}
      <button type="submit" class="btn">Create Account</button>
    </form>
    <a href="{% url 'login' %}" class="link">Pehle se account hai? Login here</a>
  </div>
</body>
</html>
