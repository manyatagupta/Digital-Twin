<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ajay's Digital Twin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .twin-card { margin-top: 50px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 card twin-card p-4">
            <h2 class="text-center mb-4">🤖 My Digital Twin</h2>
            <p class="text-muted text-center">Batao kya situation hai, tera twin batayega tu kya karega!</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="scenario" class="form-control" placeholder="E.g. Sunday evening, barish ho rahi hai, bhook lagi hai..." required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Predict Karo</button>
                </div>
            </form>

            {% if prediction %}
            <div class="mt-4 p-3 bg-light border-start border-primary border-4">
                <h5>Digital Twin Says:</h5>
                <p class="lead">{{ prediction }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
